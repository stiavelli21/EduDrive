# =============================================================================
# EduDrive — Render.com Blueprint Configuration (Infrastructure as Code)
# =============================================================================
# Quando colleghi la tua repository GitHub su Render.com e scegli "New Blueprint",
# Render leggerà automaticamente questo file per creare e configurare all'istante
# il Web Service del backend Node.js!
# =============================================================================

services:
  - type: web
    name: edudrive-backend
    runtime: node
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: DB_SSL
        value: true
      - key: MAX_FILE_SIZE_MB
        value: 50
      - key: S3_BUCKET
        value: edudrive-files
      - key: S3_FORCE_PATH_STYLE
        value: true
      # Le seguenti variabili verranno richieste al primo deploy nel pannello Render o generate in sicurezza:
      - key: DATABASE_URL
        sync: false
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: S3_ENDPOINT
        sync: false
      - key: S3_ACCESS_KEY
        sync: false
      - key: S3_SECRET_KEY
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: FIREBASE_PROJECT_ID
        value: edudrive-f412c
