# ==============================================================================
# EduDrive — Docker Compose (Development Environment)
# ==============================================================================
# This file sets up PostgreSQL and MinIO (S3-compatible storage) for local dev.
# Usage: docker-compose up -d
# ==============================================================================

services:
  # --------------------------------------------------------------------------
  # PostgreSQL — Relational database for users, nodes, permissions
  # --------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: edudrive-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: edudrive
      POSTGRES_PASSWORD: edudrive_dev_password
      POSTGRES_DB: edudrive
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Auto-execute schema on first run
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U edudrive"]
      interval: 5s
      timeout: 3s
      retries: 5

  # --------------------------------------------------------------------------
  # MinIO — S3-compatible object storage (replaces R2/B2 in development)
  # --------------------------------------------------------------------------
  minio:
    image: minio/minio:latest
    container_name: edudrive-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: edudrive_access_key
      MINIO_ROOT_PASSWORD: edudrive_secret_key
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # MinIO Console (Web UI)
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 3s
      retries: 5

  # --------------------------------------------------------------------------
  # MinIO Client — Creates the default bucket on startup
  # --------------------------------------------------------------------------
  minio-init:
    image: minio/mc:latest
    container_name: edudrive-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set edudrive http://minio:9000 edudrive_access_key edudrive_secret_key;
        mc mb edudrive/edudrive-files --ignore-existing;
        mc anonymous set none edudrive/edudrive-files;
        echo 'Bucket edudrive-files created successfully';
      "

volumes:
  postgres_data:
  minio_data:
